version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    groups:
      backend-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      frontend-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: wednesday
      time: "04:00"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
      - backend

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: wednesday
      time: "04:30"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
      - frontend
