name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: hr_employee_management_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hr_employee_management_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: 5000
      APP_NAME: HR Employee Management System
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: hr_employee_management_ci
      DB_TEST_NAME: hr_employee_management_ci
      DB_USER: postgres
      DB_PASSWORD: postgres_ci_password
      JWT_SECRET: ci_only_jwt_secret_replace_in_real_env
      JWT_EXPIRES_IN: 1d
      CORS_ORIGIN: http://localhost:3000
      UPLOAD_PATH: src/uploads
      LOG_LEVEL: error
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Run migrations
        working-directory: backend
        run: npm run db:migrate

      - name: Run seeders
        working-directory: backend
        run: npm run db:seed

      - name: Test backend
        working-directory: backend
        run: npm test

      - name: Audit backend production dependencies
        working-directory: backend
        run: npm audit --omit=dev

  frontend:
    name: Frontend validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v1
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Audit frontend production dependencies
        working-directory: frontend
        run: npm audit --omit=dev

  docker:
    name: Docker validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    env:
      DOCKER_BUILDKIT: 1
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v1
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build backend image
        run: docker build -t hrms-backend-ci:latest ./backend

      - name: Build frontend image
        run: docker build --build-arg NEXT_PUBLIC_API_BASE_URL="${NEXT_PUBLIC_API_BASE_URL}" -t hrms-frontend-ci:latest ./frontend

      - name: Report image sizes
        run: docker images hrms-backend-ci:latest hrms-frontend-ci:latest --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
