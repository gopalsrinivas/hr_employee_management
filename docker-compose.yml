services:
  postgres:
    image: postgres:17-alpine
    container_name: hr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hr_employee_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hrms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hr_employee_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: hr-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      APP_NAME: HR Employee Management System
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-hr_employee_management}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change_this_local_password}
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_long_random_secret}
      JWT_EXPIRES_IN: 1d
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-3000}
      LOG_LEVEL: info
      DB_CONNECT_RETRIES: 10
      DB_CONNECT_RETRY_DELAY_MS: 3000
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend/src/logs:/app/src/logs
      - ./backend/src/uploads:/app/src/uploads
    networks:
      - hrms_network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:${BACKEND_PORT:-5000}/api/v1}
    container_name: hr-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-5000}/api/v1
    networks:
      - hrms_network
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  hrms_network:
    driver: bridge
