services:
  postgres:
    image: postgres:17-alpine
    container_name: hr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hr_employee_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hr_employee_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: hr-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      APP_NAME: HR Employee Management System
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-hr_employee_management}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_local_env}
      JWT_EXPIRES_IN: 1d
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-3000}
      LOG_LEVEL: info
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend/src/logs:/app/src/logs
      - ./backend/src/uploads:/app/src/uploads

  frontend:
    build:
      context: ./frontend
    container_name: hr-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-5000}/api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
