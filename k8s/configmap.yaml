apiVersion: v1
kind: ConfigMap
metadata:
  name: hrms-config
  namespace: hrms
data:
  NODE_ENV: production
  APP_NAME: HR Employee Management System
  PORT: "5000"
  DB_HOST: hrms-postgres
  DB_PORT: "5432"
  DB_NAME: hr_employee_management
  JWT_EXPIRES_IN: 1d
  CORS_ORIGIN: http://hrms.local
  UPLOAD_PATH: src/uploads
  MAX_FILE_SIZE: "5242880"
  LOG_LEVEL: info
  DB_CONNECT_RETRIES: "10"
  DB_CONNECT_RETRY_DELAY_MS: "3000"
  NEXT_PUBLIC_API_BASE_URL: http://hrms.local/api/v1
