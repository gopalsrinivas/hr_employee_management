apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hrms-ingress
  namespace: hrms
spec:
  rules:
    - host: hrms.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: hrms-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hrms-frontend
                port:
                  number: 3000
